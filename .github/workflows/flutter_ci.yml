name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/package_config.json
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get
        if: ${{ hashFiles('pubspec.yaml') != '' }}

      - name: Check formatting
        run: dart format --set-exit-if-changed --output=none .
        if: ${{ hashFiles('pubspec.yaml') != '' }}

      - name: Analyze
        run: flutter analyze
        if: ${{ hashFiles('pubspec.yaml') != '' }}

      - name: Validate Supabase test secrets
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        run: |
          test -n "${{ secrets.SUPABASE_URL }}" || (echo "Missing secret: SUPABASE_URL" && exit 1)
          test -n "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" || (echo "Missing secret: SUPABASE_PUBLISHABLE_KEY" && exit 1)

      - name: Test
        run: >
          flutter test
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        if: ${{ hashFiles('pubspec.yaml') != '' }}
